<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F4F5F3">
<title>Usta Zone — Ustalar bozori</title>
<meta name="description" content="Toshkent va butun O'zbekiston bo'ylab ishonchli ustalarni toping yoki o'z xizmatingizni e'lon qiling.">

<!-- Mustaqil fayl: tashqi CDN yoki shrift ulanmagan — barcha CSS/JS shu HTML fayl ichida -->

<style>
  /* =====================================================================
     THEME TOKENS
     Ikkita rejim (dark/light) shu yerda boshqariladi. Ranglarni mijoz
     uchun almashtirish kerak bo'lsa — faqat shu ikki blokni tahrirlang.
     Manba: "Professional UI/UX Prompt" texnik topshirig'i — Navy #0F172A / Amber #F59E0B
     ===================================================================== */
  html[data-theme="dark"]{
    --bg:#0F172A; --bg-elevated:#1E293B; --bg-card:#1A2438;
    --border:#334155; --text:#F1F5F9; --text-muted:#94A3B8; --text-faint:#64748B;
    --accent:#F59E0B; --accent-ink:#1A1204; --gold:#FBBF24; --danger:#F87171; --success:#4ADE80;
    --overlay:rgba(0,0,0,.6);
    --shadow-card:0 1px 2px rgba(0,0,0,.5), 0 10px 24px rgba(0,0,0,.4);
    --shadow-btn:0 8px 20px rgba(245,158,11,.3);
    --shadow-elevated:0 20px 48px rgba(0,0,0,.55);
    --shadow-nav:0 -2px 16px rgba(0,0,0,.4);
  }
  html[data-theme="light"]{
    --bg:#F8FAFC; --bg-elevated:#FFFFFF; --bg-card:#FFFFFF;
    --border:#E2E8F0; --text:#0F172A; --text-muted:#64748B; --text-faint:#94A3B8;
    --accent:#F59E0B; --accent-ink:#1A1204; --gold:#D97706; --danger:#EF4444; --success:#22C55E;
    --overlay:rgba(15,23,42,.45);
    --shadow-card:0 1px 2px rgba(15,23,42,.04), 0 8px 22px rgba(15,23,42,.08);
    --shadow-btn:0 8px 20px rgba(245,158,11,.28);
    --shadow-elevated:0 20px 48px rgba(15,23,42,.16);
    --shadow-nav:0 -2px 14px rgba(15,23,42,.06);
  }

  *{box-sizing:border-box;}
  a{color:inherit;text-decoration:none;}

  /* ================================================================
     UTILITY LAYER — fayl to'liq mustaqil bo'lishi uchun Tailwind CDN
     olib tashlandi. Yuqorida HTML/JS ichida ishlatilgan har bir klass
     shu yerda qo'lda CSS sifatida yozilgan (attribute selektor orqali,
     shunda "w-[168px]" kabi maxsus belgili nomlar ham ishlaydi).
     ================================================================ */
  [class~="flex"]{display:flex;}
  [class~="flex-1"]{flex:1 1 0%;}
  [class~="flex-col"]{flex-direction:column;}
  [class~="grid"]{display:grid;}
  [class~="grid-cols-2"]{grid-template-columns:repeat(2,minmax(0,1fr));}
  [class~="grid-cols-3"]{grid-template-columns:repeat(3,minmax(0,1fr));}
  [class~="items-center"]{align-items:center;}
  [class~="items-end"]{align-items:flex-end;}
  [class~="justify-between"]{justify-content:space-between;}
  [class~="justify-center"]{justify-content:center;}
  [class~="block"]{display:block;}
  [class~="inline"]{display:inline;}
  [class~="inline-block"]{display:inline-block;}
  [class~="hidden"]{display:none;}
  [class~="relative"]{position:relative;}
  [class~="absolute"]{position:absolute;}
  [class~="fixed"]{position:fixed;}
  [class~="sticky"]{position:sticky;}
  [class~="overflow-hidden"]{overflow:hidden;}
  [class~="overflow-x-auto"]{overflow-x:auto;}
  [class~="pointer-events-none"]{pointer-events:none;}
  [class~="cursor-pointer"]{cursor:pointer;}
  [class~="min-w-0"]{min-width:0;}
  [class~="shrink-0"]{flex-shrink:0;}
  [class~="truncate"]{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  [class~="text-center"]{text-align:center;}
  [class~="text-left"]{text-align:left;}
  [class~="uppercase"]{text-transform:uppercase;}
  [class~="tracking-wide"]{letter-spacing:.025em;}
  [class~="resize-none"]{resize:none;}
  [class~="mx-auto"]{margin-left:auto;margin-right:auto;}
  [class~="w-full"]{width:100%;}
  [class~="max-w-lg"]{max-width:32rem;}

  [class~="top-0"]{top:0;}
  [class~="bottom-0"]{bottom:0;}
  [class~="inset-x-0"]{left:0;right:0;}
  [class~="left-3.5"]{left:14px;}
  [class~="right-2"]{right:8px;}
  [class~="right-6"]{right:24px;}
  [class~="top-2"]{top:8px;}
  [class~="top-1/2"]{top:50%;}
  [class~="-translate-y-1/2"]{transform:translateY(-50%);}
  [class~="z-40"]{z-index:40;}

  [class~="gap-1"]{gap:4px;} [class~="gap-1.5"]{gap:6px;} [class~="gap-2"]{gap:8px;}
  [class~="gap-2.5"]{gap:10px;} [class~="gap-3"]{gap:12px;} [class~="gap-3.5"]{gap:14px;}

  [class~="p-1.5"]{padding:6px;} [class~="p-2"]{padding:8px;} [class~="p-3"]{padding:12px;}
  [class~="p-3.5"]{padding:14px;} [class~="p-5"]{padding:20px;} [class~="p-1"]{padding:4px;}

  [class~="mb-1.5"]{margin-bottom:6px;} [class~="mb-1"]{margin-bottom:4px;} [class~="mb-2"]{margin-bottom:8px;} [class~="mb-2.5"]{margin-bottom:10px;}
  [class~="mb-3"]{margin-bottom:12px;} [class~="mb-4"]{margin-bottom:16px;} [class~="mb-5"]{margin-bottom:20px;} [class~="mb-6"]{margin-bottom:24px;}
  [class~="mt-0.5"]{margin-top:2px;} [class~="mt-1"]{margin-top:4px;} [class~="mt-1.5"]{margin-top:6px;}
  [class~="mt-2"]{margin-top:8px;} [class~="mt-2.5"]{margin-top:10px;} [class~="mt-auto"]{margin-top:auto;}
  [class~="ml-2"]{margin-left:8px;} [class~="ml-7"]{margin-left:28px;}
  [class~="-ml-2"]{margin-left:-8px;} [class~="-mt-7"]{margin-top:-28px;}
  [class~="my-3"]{margin-top:12px;margin-bottom:12px;} [class~="my-4"]{margin-top:16px;margin-bottom:16px;}

  [class~="px-1"]{padding-left:4px;padding-right:4px;} [class~="px-2"]{padding-left:8px;padding-right:8px;}
  [class~="px-2.5"]{padding-left:10px;padding-right:10px;} [class~="px-3"]{padding-left:12px;padding-right:12px;} [class~="px-3.5"]{padding-left:14px;padding-right:14px;}
  [class~="px-4"]{padding-left:16px;padding-right:16px;} [class~="px-5"]{padding-left:20px;padding-right:20px;}
  [class~="py-0.5"]{padding-top:2px;padding-bottom:2px;} [class~="py-1"]{padding-top:4px;padding-bottom:4px;}
  [class~="py-1.5"]{padding-top:6px;padding-bottom:6px;} [class~="py-16"]{padding-top:64px;padding-bottom:64px;}
  [class~="py-2"]{padding-top:8px;padding-bottom:8px;} [class~="py-2.5"]{padding-top:10px;padding-bottom:10px;}
  [class~="py-3"]{padding-top:12px;padding-bottom:12px;} [class~="py-3.5"]{padding-top:14px;padding-bottom:14px;}
  [class~="py-4"]{padding-top:16px;padding-bottom:16px;}
  [class~="pt-2"]{padding-top:8px;} [class~="pt-3"]{padding-top:12px;} [class~="pt-4"]{padding-top:16px;}
  [class~="pb-1"]{padding-bottom:4px;} [class~="pb-6"]{padding-bottom:24px;} [class~="pb-28"]{padding-bottom:112px;}
  [class~="pb-[calc(env(safe-area-inset-bottom)+8px)]"]{padding-bottom:calc(env(safe-area-inset-bottom) + 8px);}
  [class~="pl-11"]{padding-left:44px;}

  [class~="space-y-2.5"] > * + *{margin-top:10px;}
  [class~="space-y-4"] > * + *{margin-top:16px;}

  [class~="w-1.5"]{width:6px;} [class~="h-1.5"]{height:6px;}
  [class~="w-2"]{width:8px;} [class~="h-2"]{height:8px;}
  [class~="w-11"]{width:44px;} [class~="h-11"]{height:44px;}
  [class~="w-10"]{width:40px;} [class~="h-10"]{height:40px;}
  [class~="w-12"]{width:48px;} [class~="h-12"]{height:48px;}
  [class~="w-14"]{width:56px;} [class~="h-14"]{height:56px;}
  [class~="w-16"]{width:64px;} [class~="h-16"]{height:64px;}
  [class~="w-[168px]"]{width:168px;}

  [class~="border"]{border-width:1px;border-style:solid;}
  [class~="border-2"]{border-width:2px;border-style:solid;}
  [class~="border-b"]{border-bottom-width:1px;border-bottom-style:solid;}
  [class~="border-t"]{border-top-width:1px;border-top-style:solid;}
  [class~="border-dashed"]{border-style:dashed;}

  [class~="rounded-2xl"]{border-radius:24px;} [class~="rounded-full"]{border-radius:9999px;}
  [class~="rounded-lg"]{border-radius:12px;} [class~="rounded-xl"]{border-radius:18px;}

  [class~="text-2xl"]{font-size:24px;line-height:1.3;} [class~="text-lg"]{font-size:18px;line-height:1.4;}
  [class~="text-sm"]{font-size:14px;line-height:1.45;} [class~="text-xs"]{font-size:12px;line-height:1.4;}
  [class~="text-base"]{font-size:16px;line-height:1.5;}
  [class~="text-[10px]"]{font-size:10px;line-height:1.4;} [class~="text-[11px]"]{font-size:11px;line-height:1.4;}
  [class~="font-bold"]{font-weight:700;} [class~="font-medium"]{font-weight:500;}
  [class~="font-normal"]{font-weight:400;} [class~="font-semibold"]{font-weight:600;}
  [class~="font-sans"]{font-family:var(--font-body);}

  html,body{margin:0;padding:0;}
  :root{
    --font-body:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --font-mono:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",Menlo,monospace;
  }
  body{
    background:var(--bg); color:var(--text); font-family:var(--font-body);
    -webkit-font-smoothing:antialiased; transition:background-color .25s ease,color .25s ease;
  }
  .font-display{font-family:var(--font-body);font-weight:700;letter-spacing:-.01em;}
  .font-mono{font-family:var(--font-mono);}

  /* semantic color utilities driven by the theme tokens above */
  .bg-app{background:var(--bg);} .bg-elevated{background:var(--bg-elevated);} .bg-card{background:var(--bg-card);}
  .border-app{border-color:var(--border);} .text-main{color:var(--text);} .text-muted{color:var(--text-muted);}
  .text-faint{color:var(--text-faint);} .text-accent{color:var(--accent);} .bg-accent{background:var(--accent);}
  .text-gold{color:var(--gold);} .border-gold{border-color:var(--gold);} .border-accent{border-color:var(--accent);}
  .text-success{color:var(--success);} .bg-success{background:var(--success);}

  .app-shell{max-width:32rem;margin:0 auto;min-height:100vh;position:relative;background:var(--bg);}
  @media (min-width:641px){
    body{background:#0A0A0A;}
    .app-shell{box-shadow:0 0 90px rgba(0,0,0,.55);border-left:1px solid var(--border);border-right:1px solid var(--border);}
  }

  .no-scrollbar::-webkit-scrollbar{display:none;}
  .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}

  .page{display:none;}
  .page.active{display:block;animation:fadeSlide .3s ease;}
  @keyframes fadeSlide{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  @media (prefers-reduced-motion:reduce){
    .page.active{animation:none;}
    *{transition-duration:.01ms !important;animation-duration:.01ms !important;}
  }

  #drawer{position:fixed;top:0;left:0;height:100%;width:82%;max-width:320px;transform:translateX(-105%);
    transition:transform .3s ease;z-index:60;background:var(--bg-elevated);border-right:1px solid var(--border);overflow-y:auto;
    border-top-right-radius:26px;border-bottom-right-radius:26px;box-shadow:var(--shadow-elevated);}
  #drawer.open{transform:translateX(0);}
  #drawerOverlay{position:fixed;inset:0;background:var(--overlay);opacity:0;pointer-events:none;transition:opacity .3s ease;z-index:55;}
  #drawerOverlay.open{opacity:1;pointer-events:auto;}

  .seal{width:52px;height:52px;border-radius:9999px;border:2px dashed var(--gold);display:flex;align-items:center;justify-content:center;
    transform:rotate(-10deg);background:rgba(245,185,66,.1);position:absolute;top:-10px;left:-10px;z-index:2;}
  .seal span{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:9px;color:var(--gold);letter-spacing:.05em;}

  .card{transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease;box-shadow:var(--shadow-card);}
  @media (hover:hover){.card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:var(--shadow-elevated);}}

  a:focus-visible,button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible,label:focus-within{
    outline:2px solid var(--accent);outline-offset:2px;
  }

  .switch{width:44px;height:26px;border-radius:9999px;background:var(--border);position:relative;transition:background .2s ease;flex-shrink:0;cursor:pointer;border:none;}
  .switch::after{content:'';position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:9999px;background:var(--bg-elevated);
    transition:transform .2s ease;box-shadow:0 1px 3px rgba(0,0,0,.4);}
  .switch.on{background:var(--accent);}
  .switch.on::after{transform:translateX(18px);}

  .chip{white-space:nowrap;border:1px solid var(--border);transition:background .15s ease,color .15s ease,border-color .15s ease;}
  .chip.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}

  .boost-option{border:1px solid var(--border);transition:border-color .15s ease,background .15s ease;}
  .boost-option.selected{border-color:var(--accent);background:rgba(245,158,11,.08);}

  .setting-row:not(:last-child){border-bottom:1px solid var(--border);}

  .lang-pill{transition:background .15s ease,color .15s ease,border-color .15s ease;}
  .lang-pill.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}

  input[type="radio"]{accent-color:var(--accent);}

  [class~="shadow-card"]{box-shadow:var(--shadow-card);}

  .btn-primary{box-shadow:var(--shadow-btn);transition:transform .15s ease,box-shadow .15s ease;}
  button:not(.switch):active, a:active{transform:scale(.97);}
  @media (prefers-reduced-motion:reduce){ button:not(.switch):active, a:active{transform:none;} }

  #toastWrap{position:fixed;left:0;right:0;bottom:88px;display:flex;justify-content:center;pointer-events:none;z-index:80;padding:0 24px;}
  #toast{background:var(--bg-elevated);color:var(--text);border:1px solid var(--border);border-radius:16px;padding:10px 16px;
    font-size:13px;font-family:var(--font-body);box-shadow:0 8px 24px rgba(0,0,0,.35);opacity:0;transform:translateY(8px);
    transition:opacity .25s ease,transform .25s ease;max-width:100%;text-align:center;}
  #toast.show{opacity:1;transform:translateY(0);}

  .chat-overlay-wrap{position:fixed;inset:0;z-index:70;pointer-events:none;}
  .chat-overlay-wrap.open{pointer-events:auto;}
  .chat-overlay{max-width:32rem;margin:0 auto;height:100%;background:var(--bg);display:flex;flex-direction:column;
    transform:translateX(100%);transition:transform .3s ease;box-shadow:var(--shadow-elevated);}
  .chat-overlay-wrap.open .chat-overlay{transform:translateX(0);}
  @media (prefers-reduced-motion:reduce){.chat-overlay{transition:none;}}
  .chat-header{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;box-shadow:var(--shadow-card);}
  .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
  .chat-bubble{max-width:75%;padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.45;word-break:break-word;}
  .chat-bubble.them{align-self:flex-start;background:var(--bg-card);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text);}
  .chat-bubble.me{align-self:flex-end;background:var(--accent);color:var(--accent-ink);border-bottom-right-radius:4px;}
  .chat-bubble-time{font-size:10px;opacity:.65;margin-top:3px;display:block;font-family:var(--font-mono);}
  .chat-input-bar{display:flex;gap:8px;align-items:center;padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;
    padding-bottom:calc(env(safe-area-inset-bottom) + 10px);}
  .chat-input-bar input{flex:1;min-width:0;border-radius:9999px;border:1px solid var(--border);background:var(--bg-card);
    padding:10px 16px;font-size:14px;color:var(--text);font-family:var(--font-body);}
  .chat-send-btn{width:40px;height:40px;border-radius:9999px;background:var(--accent);display:flex;align-items:center;
    justify-content:center;flex-shrink:0;box-shadow:var(--shadow-btn);}

  #onboarding{position:fixed;inset:0;z-index:90;display:flex;justify-content:center;background:var(--bg);}
  .onb-inner{width:100%;max-width:32rem;height:100%;position:relative;overflow:hidden;}
  .onb-screen{display:none;position:absolute;inset:0;flex-direction:column;padding:40px 24px 32px;overflow-y:auto;}
  .onb-screen.active{display:flex;animation:fadeSlide .35s ease;}
  @media (prefers-reduced-motion:reduce){.onb-screen.active{animation:none;}}

  .onb-splash{background:#0F172A!important;align-items:center;justify-content:center;text-align:center;gap:6px;}
  .onb-splash-badge{width:88px;height:88px;border-radius:26px;background:linear-gradient(135deg,rgba(245,158,11,.22),rgba(245,158,11,.05));
    border:1px solid rgba(245,158,11,.35);display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:14px;}
  .onb-splash-title{font-family:var(--font-body);font-weight:700;font-size:26px;letter-spacing:-.01em;color:#F1F5F9;}
  .onb-splash-title span{color:#F59E0B;}
  .onb-splash-tagline{color:#94A3B8;font-size:13px;max-width:230px;margin-top:4px;}
  .onb-splash-bar{width:120px;height:3px;border-radius:9999px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:36px;}
  .onb-splash-bar-fill{height:100%;width:35%;background:#F59E0B;border-radius:9999px;animation:splashLoad 1.3s ease-in-out infinite;}
  @keyframes splashLoad{0%{transform:translateX(-100%);}100%{transform:translateX(340%);}}
  @media (prefers-reduced-motion:reduce){.onb-splash-bar-fill{animation:none;width:100%;}}

  .onb-tab{background:transparent;color:var(--text-muted);}
  .onb-tab.active-tab{background:var(--accent);color:var(--accent-ink);}

  .onb-role-card{background:linear-gradient(135deg,var(--bg-card),var(--bg-elevated));text-align:left;transition:transform .15s ease,border-color .15s ease;}
  .onb-role-card:active{transform:scale(.98);}
  @media (hover:hover){.onb-role-card:hover{border-color:var(--accent);}}
</style>
</head>
<body>

<!-- =====================================================================
     ONBOARDING — Splash → Login → Rol tanlash (birinchi ochilishda)
     Haqiqiy autentifikatsiya ulanganda: muvaffaqiyatli kirishdan so'ng
     finishOnboarding() chaqiriladi va foydalanuvchi sessiyasi backendda
     saqlanadi (bu yerda localStorage ishlatilmaydi — artefakt cheklovi).
     ===================================================================== -->
<div id="onboarding">
  <div class="onb-inner">

    <div id="onb-splash" class="onb-screen active onb-splash" onclick="advanceOnboarding()">
      <div class="onb-splash-badge">🛠️</div>
      <p class="onb-splash-title">USTA<span>ZONE</span></p>
      <p class="onb-splash-tagline" data-i18n="splashTagline"></p>
      <div class="onb-splash-bar"><div class="onb-splash-bar-fill"></div></div>
    </div>

    <div id="onb-login" class="onb-screen">
      <button type="button" onclick="goToSplash()" aria-label="Orqaga" class="p-1 text-muted mb-5" style="align-self:flex-start">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h2 class="font-display font-bold text-2xl text-main mb-1" data-i18n="loginTitle"></h2>
      <p class="text-sm text-muted mb-6" data-i18n="loginSubtitle"></p>

      <label class="text-xs font-medium text-muted mb-1.5 block" data-i18n="loginPhoneLabel"></label>
      <div class="flex gap-2 mb-4">
        <span class="rounded-xl border border-app bg-card px-3 py-2.5 text-sm font-mono text-main flex items-center">🇺🇿 +998</span>
        <input type="tel" inputmode="numeric" placeholder="90 123 45 67" class="flex-1 rounded-xl border border-app bg-card px-3.5 py-2.5 text-sm text-main font-mono"/>
      </div>

      <div class="flex gap-1 mb-4 rounded-xl border border-app p-1 bg-card">
        <button type="button" onclick="setLoginMode('password')" id="loginTabPassword" class="onb-tab active-tab flex-1 rounded-lg py-2 text-xs font-medium" data-i18n="loginModePassword"></button>
        <button type="button" onclick="setLoginMode('sms')" id="loginTabSms" class="onb-tab flex-1 rounded-lg py-2 text-xs font-medium" data-i18n="loginModeSms"></button>
      </div>
      <input id="loginPasswordField" type="password" data-i18n-ph="loginPasswordPh" class="w-full rounded-xl border border-app bg-card px-3.5 py-2.5 text-sm text-main mb-2"/>

const ICON_BOOKMARK_FILLED = `<svg width="14" height="14" viewBox="0 0 24 24" fill="var(--accent-ink)" stroke="var(--accent-ink)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>`;


/* =========================================================================
   4) HOLAT (STATE)
   ========================================================================= */
let state = { lang: CONFIG.defaultLang, theme: CONFIG.defaultTheme, activeTab:'home', activeCategory:null, searchQuery:'', boostChoice:'free', isCraftsman:false, savedIds:new Set(), showSavedOnly:false };

/* =========================================================================
   5) RENDER FUNKSIYALARI
   ========================================================================= */
function fmt(n){ return n.toLocaleString('ru-RU'); }

function categoryChipHTML(cat, lang, active){
  return `<button type="button" onclick="filterCategory('${cat.id}')" class="chip ${active?'active':''} shrink-0 flex items-center gap-1.5 rounded-full px-3.5 py-2 text-xs font-medium text-main">
    <span>${cat.icon}</span><span>${cat.name[lang]}</span></button>`;
}
function renderCategoryChips(){
  const lang = state.lang;
  let html = `<button type="button" onclick="filterCategory(null)" class="chip ${!state.activeCategory?'active':''} shrink-0 rounded-full px-3.5 py-2 text-xs font-medium text-main">${LABELS[lang].allChip}</button>`;
  html += CATEGORIES.map(c=>categoryChipHTML(c,lang,state.activeCategory===c.id)).join('');
  document.getElementById('categoryChips').innerHTML = html;
}

function craftsmanCardHTML(c, lang, compact){
  const cat = getCategory(c.category);
  const initials = c.name.split(' ').map(w=>w[0]).slice(0,2).join('');
  const seal = c.top.active ? `<div class="seal"><span>TOP</span></div>` : '';
  const daysLeft = c.top.active ? `<p class="font-mono text-[10px] text-gold mt-1">${c.top.daysLeft} ${LABELS[lang].daysLeftSuffix}</p>` : '';
  const isSaved = state.savedIds.has(c.id);
  const saveBtn = `<button type="button" onclick="toggleSave(${c.id}, event)" aria-label="Saqlash" aria-pressed="${isSaved}"
      class="absolute rounded-full flex items-center justify-center" style="top:8px;right:8px;width:26px;height:26px;background:${isSaved?'var(--accent)':'rgba(0,0,0,.4)'}">
      ${isSaved ? ICON_BOOKMARK_FILLED : ICON_BOOKMARK_OUTLINE}
    </button>`;
  return `<div class="card ${compact?'w-[168px] shrink-0':''} relative rounded-2xl bg-card border border-app p-3">
    ${seal}${saveBtn}
    <div class="w-12 h-12 rounded-full flex items-center justify-center font-display font-bold text-accent text-sm mb-2.5 border border-app" style="background:rgba(245,158,11,.1)">${initials}</div>
    <p class="font-display font-semibold text-sm text-main truncate">${c.name}</p>
    <p class="text-xs text-muted truncate mt-0.5">${cat.name[lang]}</p>
    <div class="flex items-center gap-1 mt-1.5 text-xs">
      <span class="text-gold">${ICON_STAR}</span>
      <span class="font-mono text-main">${c.rating}</span>
      <span class="text-faint">(${c.reviews})</span>
      <span class="text-faint">·</span>
      <span class="text-faint truncate">${c.city[lang]}</span>
    </div>
    <p class="font-mono text-sm text-accent font-semibold mt-2">${fmt(c.priceFrom)} <span class="text-[10px] text-muted font-sans font-normal">${LABELS[lang].currency}</span></p>
    ${daysLeft}
    <a href="tel:${c.phone}" class="w-full mt-2.5 rounded-lg border border-app text-main text-xs font-medium py-2 flex items-center justify-center">${LABELS[lang].contactBtn}</a>
  </div>`;
}

function getFilteredCraftsmen(){
  const q = state.searchQuery.trim().toLowerCase();
  return CRAFTSMEN.filter(c=>{
    if(state.showSavedOnly && !state.savedIds.has(c.id)) return false;
    const matchesCat = !state.activeCategory || c.category===state.activeCategory;
    const catName = getCategory(c.category).name[state.lang].toLowerCase();
    const matchesQuery = !q || c.name.toLowerCase().includes(q) || catName.includes(q);
    return matchesCat && matchesQuery;
  });
}

function refreshHome(){
  const list = getFilteredCraftsmen();
  renderCategoryChips();
  const top = list.filter(c=>c.top.active);
  document.getElementById('topCraftsmen').innerHTML = top.map(c=>craftsmanCardHTML(c,state.lang,true)).join('');
  document.getElementById('allCraftsmen').innerHTML = list.map(c=>craftsmanCardHTML(c,state.lang,false)).join('');
}
function filterCategory(id){ state.activeCategory = (state.activeCategory===id) ? null : id; state.showSavedOnly = false; refreshHome(); }
function onSearch(e){ state.searchQuery = e.target.value; refreshHome(); }
function toggleSave(id, evt){
  evt.preventDefault(); evt.stopPropagation();
  if(state.savedIds.has(id)){ state.savedIds.delete(id); showToast(LABELS[state.lang].toastUnsaved); }
  else { state.savedIds.add(id); showToast(LABELS[state.lang].toastSaved); }
  refreshHome();
}
function showSaved(){
  closeDrawer();
  state.activeCategory = null; state.showSavedOnly = true; state.searchQuery = '';
  const si = document.getElementById('searchInput'); if(si) si.value = '';
  switchTab('home');
  refreshHome();
}

function categoryTileHTML(cat, lang){
  return `<button type="button" onclick="filterCategory('${cat.id}'); switchTab('home')" class="rounded-2xl bg-card border border-app p-3.5 flex flex-col items-center gap-2 text-center">
    <span class="text-2xl">${cat.icon}</span><span class="text-xs font-medium text-main">${cat.name[lang]}</span><span class="font-mono text-[10px] text-muted">${cat.count}</span></button>`;
}
function renderCategoriesGrid(){ document.getElementById('categoriesGrid').innerHTML = CATEGORIES.map(c=>categoryTileHTML(c,state.lang)).join(''); }

function populatePostSelects(){
  const lang = state.lang;
  const catSel = document.getElementById('postCategory');
  const prevCat = catSel.value;
  catSel.innerHTML = `<option value="">${LABELS[lang].fieldCategoryPh}</option>` + CATEGORIES.map(c=>`<option value="${c.id}">${c.icon} ${c.name[lang]}</option>`).join('');
  catSel.value = prevCat;

  const citySel = document.getElementById('postCity');
  const prevCity = citySel.value;
  citySel.innerHTML = `<option value="">${LABELS[lang].fieldCityPh}</option>` + Object.entries(CITIES).map(([key,c])=>`<option value="${key}">${c[lang]}</option>`).join('');
  citySel.value = prevCity;
}

function validatePhoto(e){
  const file = e.target.files && e.target.files[0];
  const nameEl = document.getElementById('photoFileName');
  if(!file){ if(nameEl) nameEl.textContent = ''; return; }
  const maxBytes = 5 * 1024 * 1024;
  if(file.size > maxBytes){
    showToast(LABELS[state.lang].toastPhotoTooBig);
    e.target.value = '';
    if(nameEl) nameEl.textContent = '';
    return;
  }
  if(nameEl) nameEl.textContent = file.name;
}

function updateBoostPricesLabels(){
  const lang = state.lang, cur = LABELS[lang].currency;
  document.getElementById('priceFreeLabel').textContent = `0 ${cur}`;
  document.getElementById('priceDailyLabel').textContent = `${fmt(CONFIG.boost.dailyPrice)} ${cur}/${LABELS[lang].perDay}`;
  document.getElementById('priceMonthlyLabel').textContent = `${fmt(CONFIG.boost.monthlyPrice)} ${cur}`;
  updateTotal();
}
function selectBoost(type){
  state.boostChoice = type;
  document.querySelectorAll('.boost-option').forEach(el=>el.classList.toggle('selected', el.dataset.boost===type));
  updateTotal();
}
function updateTotal(){
  const cur = LABELS[state.lang].currency;
  let total = 0;
  if(state.boostChoice==='daily') total = CONFIG.boost.dailyPrice;
  if(state.boostChoice==='monthly') total = CONFIG.boost.monthlyPrice;
  document.getElementById('totalPrice').textContent = `${fmt(total)} ${cur}`;
}

function submitAd(e){
  e.preventDefault();
  // TODO: backend ulanganda shu yerga so'rov qo'shiladi, masalan:
  // await fetch('/api/listings', { method:'POST', body: new FormData(e.target) });
  document.getElementById('postForm').classList.add('hidden');
  document.getElementById('postSuccess').classList.remove('hidden');
}
function resetPostForm(){
  document.getElementById('postForm').classList.remove('hidden');
  document.getElementById('postSuccess').classList.add('hidden');
  document.querySelector('#postForm form').reset();
  document.getElementById('photoFileName').textContent = '';
  selectBoost('free');
}

function messageItemHTML(m, i){
  const initials = m.name.split(' ').map(w=>w[0]).slice(0,2).join('');
  return `<button type="button" onclick="openChat(${i})" class="setting-row w-full flex items-center gap-3 px-1 py-3 text-left">
    <div class="w-11 h-11 shrink-0 rounded-full bg-card border border-app flex items-center justify-center font-display font-semibold text-accent text-xs">${initials}</div>
    <div class="flex-1 min-w-0">
      <div class="flex items-center justify-between">
        <p class="text-sm font-medium text-main truncate">${m.name}</p>
        <span class="font-mono text-[10px] text-faint shrink-0 ml-2">${m.time}</span>
      </div>
      <p class="text-xs text-muted truncate mt-0.5">${m.snippet}</p>
    </div>
    ${m.unread ? '<span class="w-2 h-2 rounded-full bg-success shrink-0"></span>' : ''}
  </button>`;
}
function renderMessages(){ document.getElementById('messagesList').innerHTML = MESSAGES_MOCK.map(messageItemHTML).join(''); }

function escapeHtml(s){ return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function nowLabel(){ const d = new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

function openChat(i){
  activeChatIndex = i;
  const m = MESSAGES_MOCK[i];
  if(!m) return;
  document.getElementById('chatName').textContent = m.name;
  document.getElementById('chatAvatar').textContent = m.name.split(' ').map(w=>w[0]).slice(0,2).join('');
  m.unread = false;
  renderMessages();
  renderChatMessages(i);
  document.getElementById('chatOverlay').classList.add('open');
}
function closeChat(){ document.getElementById('chatOverlay').classList.remove('open'); activeChatIndex = null; }
function renderChatMessages(i){
  const history = CHAT_HISTORY[i] || [];
  const el = document.getElementById('chatMessages');
  el.innerHTML = history.map(msg=>`<div class="chat-bubble ${msg.from==='me'?'me':'them'}">${escapeHtml(msg.text)}<span class="chat-bubble-time">${msg.time}</span></div>`).join('');
  el.scrollTop = el.scrollHeight;
}
function sendChatMessage(e){
  e.preventDefault();
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text || activeChatIndex===null) return;
  if(!CHAT_HISTORY[activeChatIndex]) CHAT_HISTORY[activeChatIndex] = [];
  CHAT_HISTORY[activeChatIndex].push({from:'me', text, time: nowLabel()});
  MESSAGES_MOCK[activeChatIndex].snippet = text;
  MESSAGES_MOCK[activeChatIndex].time = nowLabel();
  input.value = '';
  renderChatMessages(activeChatIndex);
  // TODO: backend ulanganda shu yerga POST /api/chats/:id/messages so'rovi qo'shiladi
}

/* =========================================================================
   6) NAVIGATSIYA / SOZLAMALAR
   ========================================================================= */
function switchTab(tab){
  state.activeTab = tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active', p.id === 'page-'+tab));
  document.querySelectorAll('.tab-btn').forEach(b=>{
    const isActive = b.dataset.tab === tab;
    b.classList.toggle('text-accent', isActive);
    b.classList.toggle('text-muted', !isActive);
  });
  window.scrollTo({top:0});
}
function openDrawer(){ document.getElementById('drawer').classList.add('open'); document.getElementById('drawerOverlay').classList.add('open'); }
function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); }

function showOnbScreen(name){ document.querySelectorAll('.onb-screen').forEach(el=>el.classList.toggle('active', el.id==='onb-'+name)); }
function advanceOnboarding(){ showOnbScreen('login'); }
function goToSplash(){ showOnbScreen('splash'); }
function goRoleSelect(){ showOnbScreen('role'); }
function setLoginMode(mode){
  const isSms = mode === 'sms';
  document.getElementById('loginPasswordField').classList.toggle('hidden', isSms);
  document.getElementById('loginSmsHint').classList.toggle('hidden', !isSms);
  document.getElementById('loginTabPassword').classList.toggle('active-tab', !isSms);
  document.getElementById('loginTabSms').classList.toggle('active-tab', isSms);
}
function selectRole(isWorker){
  state.isCraftsman = isWorker;
  const ws = document.getElementById('workSwitch');
  if(ws){ ws.classList.toggle('on', isWorker); ws.setAttribute('aria-pressed', String(isWorker)); }
  finishOnboarding();
}
function finishOnboarding(){
  document.getElementById('onboarding').style.display = 'none';
  switchTab('home');
}
function skipOnboarding(){ finishOnboarding(); }

let toastTimer;
function showToast(message){
  const el = document.getElementById('toast');
  if(!el) return;
  el.textContent = message;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2600);
}
function comingSoon(){ showToast(LABELS[state.lang].toastComingSoon); }
function showSupportInfo(){ showToast(LABELS[state.lang].toastSupport); }
function handleLogout(){ closeDrawer(); showToast(LABELS[state.lang].toastLoggedOut); }

function toggleTheme(){
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('themeSwitch').classList.toggle('on', state.theme === 'dark');
  document.getElementById('themeIcon').innerHTML = state.theme === 'dark' ? ICON_MOON : ICON_SUN;
  // TODO: real ilovada bu qiymat foydalanuvchi profiliga backend orqali saqlanadi
}
function toggleWork(){
  state.isCraftsman = !state.isCraftsman;
  const btn = document.getElementById('workSwitch');
  btn.classList.toggle('on', state.isCraftsman);
  btn.setAttribute('aria-pressed', state.isCraftsman);
}
function highlightLangPills(){
  document.querySelectorAll('.lang-pill').forEach(b=>b.classList.toggle('active', b.dataset.langBtn === state.lang));
}
function setLang(lang){
  state.lang = lang;
  applyLabels();
  highlightLangPills();
  populatePostSelects();
  updateBoostPricesLabels();
  refreshHome();
  renderCategoriesGrid();
}
function applyLabels(){
  const L = LABELS[state.lang];
  document.querySelectorAll('[data-i18n]').forEach(el=>{ const k = el.getAttribute('data-i18n'); if(L[k]!==undefined) el.textContent = L[k]; });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{ const k = el.getAttribute('data-i18n-ph'); if(L[k]!==undefined) el.setAttribute('placeholder', L[k]); });
  document.documentElement.setAttribute('lang', state.lang);
}

/* =========================================================================
   7) INIT
   ========================================================================= */
function init(){
  document.getElementById('activeCount').textContent = fmt(CATEGORIES.reduce((s,c)=>s+c.count,0));
  applyLabels();
  highlightLangPills();
  populatePostSelects();
  updateBoostPricesLabels();
  renderCategoriesGrid();
  renderMessages();
  refreshHome();
  switchTab('home');
  setTimeout(()=>{ if(document.getElementById('onb-splash').classList.contains('active')) advanceOnboarding(); }, 1800);
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
